<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond blanc -->
  <rect width="200" height="80" fill="white" rx="8"/>
  
  <!-- Texte TEAM -->
  <text x="20" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="black">TEAM</text>
  
  <!-- Texte life -->
  <text x="120" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#5DADE2">life</text>
  
  <!-- Texte TRI -->
  <text x="170" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="black">TRI</text>
  
